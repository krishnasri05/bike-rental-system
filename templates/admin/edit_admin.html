{% extends 'base.html' %}
{% block title %}Edit Admin{% endblock %}
{% block content %}
<div class="container-fluid"><div class="row">{% include 'admin/_sidebar.html' %}
<div class="col-md-9 col-lg-10 main-content">{% set title='Edit Admin' %}{% include 'admin/_topbar.html' %}
<div class="container-fluid mt-4"><div class="d-flex justify-content-between align-items-center mb-4"><div><h2><i class="fas fa-edit me-2"></i>Edit Admin</h2><p class="text-muted">Update admin information</p></div><a href="{{ url_for('admin_profile') }}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-2"></i>Back to Admins</a></div>
<div class="card"><div class="card-body"><form method="POST"><div class="row"><div class="col-md-6"><div class="mb-3"><label class="form-label">Username *</label><input type="text" class="form-control" name="username" value="{{ admin.username }}" required></div></div><div class="col-md-6"><div class="mb-3"><label class="form-label">Email *</label><input type="email" class="form-control" name="email" value="{{ admin.email }}" required></div></div></div><div class="mb-3"><label class="form-label">Full Name *</label><input type="text" class="form-control" name="full_name" value="{{ admin.full_name }}" required></div><div class="mb-3"><label class="form-label">Status</label><select class="form-select" name="status"><option value="active" {{ 'selected' if admin.status=='active' }}>Active</option><option value="inactive" {{ 'selected' if admin.status=='inactive' }}>Inactive</option></select></div><div class="d-grid gap-2 d-md-flex justify-content-md-end"><a href="{{ url_for('admin_profile') }}" class="btn btn-secondary me-md-2">Cancel</a><button type="submit" class="btn btn-primary">Update Admin</button></div></form></div></div>
</div></div></div></div>
{% endblock %}
