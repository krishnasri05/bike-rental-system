<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bike Rental System{% endblock %}</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #0b0f19;
            color: #fff;
            overflow-x: hidden;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 16px;
            color: #fff;
        }

        /* Nav Glassmorphism */
        .navbar.glass-nav {
            background: rgba(15, 23, 42, 0.6) !important;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar-brand, .nav-link { color: #fff !important; }

        /* Button Animations */
        .btn-glass {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            border-radius: 30px;
            padding: 10px 24px;
            font-weight: 600;
            backdrop-filter: blur(5px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        .btn-glass:before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s ease;
            z-index: -1;
        }
        .btn-glass:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 20px rgba(0,255,255,0.3);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.8);
        }
        .btn-glass:hover:before { left: 100%; }
        
        .btn-primary {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            border: none;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.6);
        }

        /* Forms */
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
            border-color: #00f2fe;
        }
        ::placeholder { color: rgba(255,255,255,0.6) !important; }

        .text-dark { color: #fff !important; }
        .card { background: transparent; border: none; }
        .card-body { border-radius: 16px; }

    </style>
    {% block head %}{% endblock %}
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div style="position: relative; z-index: 10;">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="container mt-4">
            {% for category, message in messages %}
            <div class="alert alert-{{ 'danger' if category in ['danger', 'error'] else 'info' }} glass-panel alert-dismissible fade show" role="alert" style="border-left: 4px solid #00f2fe;">
                {{ message }}
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
        </div>
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
    // Three.js Background Animation
    const canvas = document.getElementById('bg-canvas');
    const scene = new THREE.Scene();
    // Ambient color gradient
    scene.fog = new THREE.FogExp2(0x0b0f19, 0.001);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
    
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    camera.position.z = 30;

    // Create a particle wave geometry
    const geometry = new THREE.BufferGeometry();
    const count = 3000;
    const positions = new Float32Array(count * 3);
    for(let i=0; i<count*3; i++) {
        positions[i] = (Math.random() - 0.5) * 100;
    }
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    
    // Shader material for glowing particles
    const material = new THREE.PointsMaterial({
        size: 0.2,
        color: 0x00f2fe,
        transparent: true,
        opacity: 0.8,
        blending: THREE.AdditiveBlending
    });

    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    // Mouse interaction
    let mouseX = 0;
    let mouseY = 0;
    document.addEventListener('mousemove', (event) => {
        mouseX = event.clientX / window.innerWidth - 0.5;
        mouseY = event.clientY / window.innerHeight - 0.5;
    });

    let frame = 0;
    function animate() {
        requestAnimationFrame(animate);
        frame += 0.01;
        
        // Make the particles wave
        const positions = particles.geometry.attributes.position.array;
        for(let i = 0; i < count; i++) {
            const i3 = i * 3;
            const x = positions[i3];
            const z = positions[i3+2];
            positions[i3+1] = Math.sin(frame + x * 0.1) * 2 + Math.cos(frame + z * 0.1) * 2;
        }
        particles.geometry.attributes.position.needsUpdate = true;

        // Rotate scene slightly based on mouse
        particles.rotation.y += (mouseX * 0.5 - particles.rotation.y) * 0.05;
        particles.rotation.x += (mouseY * 0.5 - particles.rotation.x) * 0.05;

        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
{% block scripts %}{% endblock %}
</body>
</html>
